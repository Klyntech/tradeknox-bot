services:
  - type: web
    name: tradeknox-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: PRIVATE_CHANNEL_ID
        sync: false
      - key: PUBLIC_CHANNEL_ID
        sync: false
      - key: DATA_SOURCE
        value: twelvedata
      - key: TWELVEDATA_API_KEY
        sync: false
      - key: LICENSE_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_VIP_PRICE_ID
        sync: false
      - key: DOMAIN
        sync: false
      - key: ACCOUNT_BALANCE
        value: "10000"

  - type: web
    name: tradeknox-website
    runtime: node
    plan: free
    buildCommand: cd website && npm install && npm run build
    startCommand: npx serve dist -l $PORT --single
    workingDir: website