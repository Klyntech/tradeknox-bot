services:
  - type: web
    name: tradeknox-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: PRIVATE_CHANNEL_ID
        sync: false
      - key: PUBLIC_CHANNEL_ID
        sync: false
      - key: DATA_SOURCE
        value: twelvedata
      - key: TWELVEDATA_API_KEY
        sync: false
      - key: LICENSE_SECRET
        generateValue: true
      - key: ACCOUNT_BALANCE
        value: "10000"

  - type: static_site
    name: tradeknox-website
    runtime: static
    buildCommand: cd website && npm install && npm run build
    staticPublishPath: website/dist
    envVars:
      - key: NODE_VERSION
        value: "20"
